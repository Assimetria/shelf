<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Shelf — Your digital content, beautifully organized">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0e0e1f"/>
    </linearGradient>
    <!-- Radial glow orange -->
    <radialGradient id="glowOrange" cx="35%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <!-- Radial glow indigo -->
    <radialGradient id="glowIndigo" cx="75%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <!-- Orange gradient for shelves -->
    <linearGradient id="shelfGradTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="shelfGradMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FDBA74" stop-opacity="0.70"/>
    </linearGradient>
    <linearGradient id="shelfGradBot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FED7AA" stop-opacity="0.45"/>
    </linearGradient>
    <!-- Indigo support -->
    <linearGradient id="supportGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glows -->
  <rect width="1200" height="630" fill="url(#glowOrange)"/>
  <rect width="1200" height="630" fill="url(#glowIndigo)"/>

  <!-- ── LEFT CONTENT COLUMN ── -->

  <!-- Shelf logo mark — scaled for OG -->
  <g transform="translate(80, 180) scale(0.22)">
    <!-- Support pillar -->
    <rect x="120" y="108" width="20" height="296" rx="10" fill="url(#supportGrad)"/>
    <!-- Top shelf -->
    <rect x="120" y="108" width="224" height="40" rx="16" fill="url(#shelfGradTop)"/>
    <!-- Items on top shelf -->
    <rect x="156" y="76" width="14" height="32" rx="5" fill="#6366F1" opacity="0.85"/>
    <rect x="176" y="80" width="10" height="28" rx="4" fill="#818CF8" opacity="0.70"/>
    <rect x="192" y="72" width="16" height="36" rx="5" fill="#6366F1" opacity="0.90"/>
    <rect x="214" y="79" width="11" height="29" rx="4" fill="#A5B4FC" opacity="0.60"/>
    <rect x="231" y="74" width="13" height="34" rx="5" fill="#6366F1" opacity="0.75"/>
    <rect x="265" y="76" width="15" height="32" rx="5" fill="#6366F1" opacity="0.80"/>
    <!-- Middle shelf -->
    <rect x="120" y="228" width="288" height="40" rx="16" fill="url(#shelfGradMid)"/>
    <!-- Items on middle shelf -->
    <rect x="156" y="196" width="14" height="32" rx="5" fill="#6366F1" opacity="0.80"/>
    <rect x="176" y="200" width="10" height="28" rx="4" fill="#818CF8" opacity="0.65"/>
    <rect x="192" y="192" width="16" height="36" rx="5" fill="#6366F1" opacity="0.85"/>
    <rect x="231" y="194" width="13" height="34" rx="5" fill="#F97316" opacity="0.70"/>
    <rect x="265" y="196" width="15" height="32" rx="5" fill="#6366F1" opacity="0.75"/>
    <rect x="302" y="195" width="14" height="33" rx="5" fill="#A5B4FC" opacity="0.70"/>
    <!-- Bottom shelf -->
    <rect x="120" y="348" width="272" height="40" rx="16" fill="url(#shelfGradBot)"/>
    <!-- Items on bottom shelf -->
    <rect x="156" y="316" width="14" height="32" rx="5" fill="#6366F1" opacity="0.70"/>
    <rect x="192" y="312" width="16" height="36" rx="5" fill="#6366F1" opacity="0.75"/>
    <rect x="231" y="314" width="13" height="34" rx="5" fill="#F97316" opacity="0.65"/>
    <rect x="265" y="316" width="15" height="32" rx="5" fill="#818CF8" opacity="0.65"/>
    <!-- Floor line -->
    <rect x="100" y="388" width="312" height="6" rx="3" fill="#F97316" opacity="0.18"/>
  </g>

  <!-- Product name -->
  <text x="80" y="280" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="800" fill="#f9fafb" letter-spacing="-2">Shelf</text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="400" fill="#9ca3af">Your digital content, beautifully organized.</text>

  <!-- Feature pills -->
  <g transform="translate(80, 370)">
    <!-- Pill 1: Save -->
    <rect x="0" y="0" width="130" height="36" rx="18" fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.25)" stroke-width="1"/>
    <text x="65" y="23" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#FB923C" text-anchor="middle">One-click saves</text>

    <!-- Pill 2: Organize -->
    <rect x="144" y="0" width="154" height="36" rx="18" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
    <text x="221" y="23" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#818CF8" text-anchor="middle">Smart collections</text>

    <!-- Pill 3: Search -->
    <rect x="312" y="0" width="148" height="36" rx="18" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
    <text x="386" y="23" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#34D399" text-anchor="middle">Full-text search</text>
  </g>

  <!-- Divider -->
  <line x1="560" y1="60" x2="560" y2="570" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- ── RIGHT PRODUCT UI PANEL ── -->
  <g transform="translate(590, 60)">
    <!-- Window chrome -->
    <rect x="0" y="0" width="560" height="510" rx="16" fill="#111120" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Titlebar -->
    <rect x="0" y="0" width="560" height="44" rx="16" fill="rgba(255,255,255,0.02)"/>
    <rect x="0" y="28" width="560" height="16" fill="rgba(255,255,255,0.02)"/>
    <!-- Traffic lights -->
    <circle cx="22" cy="22" r="6" fill="#FF5F57"/>
    <circle cx="42" cy="22" r="6" fill="#FEBC2E"/>
    <circle cx="62" cy="22" r="6" fill="#28C840"/>
    <!-- Top border line under chrome -->
    <line x1="0" y1="44" x2="560" y2="44" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Left sidebar -->
    <rect x="0" y="44" width="160" height="466" rx="0" fill="rgba(255,255,255,0.01)"/>
    <line x1="160" y1="44" x2="160" y2="510" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Sidebar logo -->
    <rect x="16" y="60" width="18" height="18" rx="5" fill="#F97316"/>
    <text x="42" y="74" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f9fafb">Shelf</text>

    <!-- Nav items -->
    <rect x="12" y="96" width="136" height="28" rx="6" fill="rgba(249,115,22,0.10)"/>
    <text x="32" y="115" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#FB923C">Library</text>
    <text x="32" y="148" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#6b7280">Collections</text>
    <text x="32" y="176" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#6b7280">Highlights</text>
    <text x="32" y="204" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#6b7280">Discover</text>

    <!-- Sidebar section label -->
    <text x="16" y="240" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#4b5563" letter-spacing="1">TAGS</text>
    <circle cx="24" cy="258" r="4" fill="#F97316"/>
    <text x="36" y="263" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">AI &amp; Tech</text>
    <circle cx="24" cy="278" r="4" fill="#6366F1"/>
    <text x="36" y="283" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">Design</text>
    <circle cx="24" cy="298" r="4" fill="#10B981"/>
    <text x="36" y="303" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">Product</text>

    <!-- User row at bottom of sidebar -->
    <circle cx="26" cy="488" r="12" fill="url(#shelfGradTop)"/>
    <text x="26" y="493" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle">SR</text>
    <text x="46" y="485" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#f9fafb">Sara Rodrigues</text>
    <text x="46" y="497" font-family="Inter, sans-serif" font-size="8" fill="#4b5563">sara@example.com</text>

    <!-- Main content area -->
    <!-- Topbar search -->
    <rect x="170" y="52" width="240" height="28" rx="7" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="186" y="70" font-family="Inter, sans-serif" font-size="10" fill="#4b5563">Search your library...</text>

    <!-- Stats row -->
    <rect x="170" y="90" width="110" height="52" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="180" y="110" font-family="Inter, sans-serif" font-size="9" fill="#6b7280">Total saves</text>
    <text x="180" y="131" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#f9fafb" letter-spacing="-1">247</text>

    <rect x="288" y="90" width="110" height="52" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="298" y="110" font-family="Inter, sans-serif" font-size="9" fill="#6b7280">Collections</text>
    <text x="298" y="131" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#818CF8" letter-spacing="-1">8</text>

    <rect x="406" y="90" width="110" height="52" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="416" y="110" font-family="Inter, sans-serif" font-size="9" fill="#6b7280">Highlights</text>
    <text x="416" y="131" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#F97316" letter-spacing="-1">18</text>

    <!-- Content cards -->
    <rect x="170" y="158" width="180" height="100" rx="10" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <rect x="186" y="174" width="24" height="24" rx="6" fill="url(#shelfGradTop)"/>
    <text x="186" y="215" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#f9fafb">Building a second brain</text>
    <text x="186" y="230" font-family="Inter, sans-serif" font-size="9" fill="#4b5563">medium.com · 8 min</text>
    <rect x="186" y="240" width="36" height="14" rx="7" fill="rgba(249,115,22,0.12)"/>
    <text x="204" y="251" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#FB923C" text-anchor="middle">AI</text>

    <rect x="358" y="158" width="180" height="100" rx="10" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <rect x="374" y="174" width="24" height="24" rx="6" fill="url(#supportGrad)"/>
    <text x="374" y="215" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#f9fafb">Design systems handbook</text>
    <text x="374" y="230" font-family="Inter, sans-serif" font-size="9" fill="#4b5563">figma.com · 12 min</text>
    <rect x="374" y="240" width="46" height="14" rx="7" fill="rgba(99,102,241,0.12)"/>
    <text x="397" y="251" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#818CF8" text-anchor="middle">Design</text>

    <rect x="170" y="270" width="180" height="100" rx="10" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <rect x="186" y="286" width="24" height="24" rx="6" fill="#10B981" fill-opacity="0.8"/>
    <text x="186" y="327" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#f9fafb">How Stripe builds products</text>
    <text x="186" y="342" font-family="Inter, sans-serif" font-size="9" fill="#4b5563">stripe.com · 6 min</text>
    <rect x="186" y="352" width="50" height="14" rx="7" fill="rgba(16,185,129,0.12)"/>
    <text x="211" y="363" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#34D399" text-anchor="middle">Product</text>

    <rect x="358" y="270" width="180" height="100" rx="10" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <rect x="374" y="286" width="24" height="24" rx="6" fill="#8B5CF6" fill-opacity="0.8"/>
    <text x="374" y="327" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#f9fafb">Ship fast, ship often</text>
    <text x="374" y="342" font-family="Inter, sans-serif" font-size="9" fill="#4b5563">vercel.com · 9 min</text>
    <rect x="374" y="352" width="64" height="14" rx="7" fill="rgba(139,92,246,0.12)"/>
    <text x="406" y="363" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#A78BFA" text-anchor="middle">Engineering</text>

    <!-- Bottom highlights row -->
    <rect x="170" y="384" width="366" height="60" rx="10" fill="rgba(249,115,22,0.04)" stroke="rgba(249,115,22,0.12)" stroke-width="1"/>
    <line x1="174" y1="384" x2="174" y2="444" stroke="#F97316" stroke-width="3" stroke-linecap="round"/>
    <text x="186" y="405" font-family="Inter, sans-serif" font-size="10" font-weight="400" fill="#9ca3af">"The best way to have a good idea is to have lots of ideas</text>
    <text x="186" y="421" font-family="Inter, sans-serif" font-size="10" fill="#9ca3af">and then throw away the bad ones."</text>
    <text x="186" y="438" font-family="Inter, sans-serif" font-size="9" fill="#4b5563">Building a second brain — medium.com</text>
  </g>

  <!-- Bottom bar with brand info -->
  <rect x="0" y="595" width="1200" height="35" fill="rgba(249,115,22,0.05)"/>
  <text x="80" y="617" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.3)">shelf.app</text>
  <text x="1120" y="617" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.2)" text-anchor="end">by Assimetria</text>
</svg>
