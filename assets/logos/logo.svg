<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Shelf logo: mark + wordmark for default (light) backgrounds -->

  <!-- Mark (40×40 centred vertically in 80px height) -->
  <!-- Top shelf -->
  <rect x="4" y="14" width="32" height="8" rx="4" fill="#F97316"/>
  <!-- Middle shelf -->
  <rect x="0" y="28" width="40" height="8" rx="4" fill="#F97316" opacity="0.82"/>
  <!-- Bottom shelf -->
  <rect x="-4" y="42" width="48" height="8" rx="4" fill="#F97316" opacity="0.62"/>

  <!-- "Shelf" wordmark -->
  <text x="60" y="52"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="36" font-weight="700" letter-spacing="-1"
        fill="#111827">Shelf</text>
</svg>
