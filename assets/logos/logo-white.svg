<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120" role="img" aria-label="Shelf — white version">
  <title>Shelf</title>
  <defs>
    <!-- All-white gradients for the shelves — subtle opacity variation to keep depth -->
    <linearGradient id="whiteShelfTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="whiteShelfMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.80"/>
    </linearGradient>
    <linearGradient id="whiteShelfBot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.68"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="whiteSupportGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ── Mark (all white icon, left-aligned) ── -->

  <!-- Vertical support pillar -->
  <rect x="12" y="12" width="6" height="96" rx="3" fill="url(#whiteSupportGrad)"/>

  <!-- Top shelf -->
  <rect x="12" y="12" width="68" height="12" rx="5" fill="url(#whiteShelfTop)"/>

  <!-- Items on top shelf -->
  <rect x="22" y="3"  width="4"  height="9"  rx="2" fill="#FFFFFF" opacity="0.80"/>
  <rect x="28" y="4"  width="3"  height="8"  rx="1" fill="#FFFFFF" opacity="0.65"/>
  <rect x="33" y="2"  width="5"  height="10" rx="2" fill="#FFFFFF" opacity="0.85"/>
  <rect x="40" y="4"  width="3"  height="8"  rx="1" fill="#FFFFFF" opacity="0.60"/>
  <rect x="45" y="3"  width="4"  height="9"  rx="2" fill="#FFFFFF" opacity="0.70"/>
  <rect x="51" y="5"  width="3"  height="7"  rx="1" fill="#FFFFFF" opacity="0.50"/>
  <rect x="56" y="3"  width="4"  height="9"  rx="2" fill="#FFFFFF" opacity="0.75"/>
  <rect x="62" y="4"  width="3"  height="8"  rx="1" fill="#FFFFFF" opacity="0.60"/>

  <!-- Middle shelf -->
  <rect x="12" y="54" width="86" height="12" rx="5" fill="url(#whiteShelfMid)"/>

  <!-- Items on middle shelf -->
  <rect x="22" y="45" width="4"  height="9"  rx="2" fill="#FFFFFF" opacity="0.75"/>
  <rect x="28" y="46" width="3"  height="8"  rx="1" fill="#FFFFFF" opacity="0.60"/>
  <rect x="33" y="44" width="5"  height="10" rx="2" fill="#FFFFFF" opacity="0.80"/>
  <rect x="40" y="46" width="3"  height="8"  rx="1" fill="#FFFFFF" opacity="0.55"/>
  <rect x="45" y="44" width="4"  height="9"  rx="2" fill="#FFFFFF" opacity="0.70"/>
  <rect x="51" y="47" width="3"  height="7"  rx="1" fill="#FFFFFF" opacity="0.50"/>
  <rect x="56" y="45" width="4"  height="9"  rx="2" fill="#FFFFFF" opacity="0.65"/>
  <rect x="62" y="46" width="3"  height="8"  rx="1" fill="#FFFFFF" opacity="0.55"/>
  <rect x="67" y="45" width="4"  height="9"  rx="2" fill="#FFFFFF" opacity="0.70"/>
  <rect x="73" y="47" width="3"  height="7"  rx="1" fill="#FFFFFF" opacity="0.50"/>
  <rect x="78" y="45" width="4"  height="9"  rx="2" fill="#FFFFFF" opacity="0.60"/>
  <rect x="84" y="46" width="3"  height="8"  rx="1" fill="#FFFFFF" opacity="0.55"/>

  <!-- Bottom shelf -->
  <rect x="12" y="96" width="76" height="12" rx="5" fill="url(#whiteShelfBot)"/>

  <!-- Items on bottom shelf -->
  <rect x="22" y="87" width="4"  height="9"  rx="2" fill="#FFFFFF" opacity="0.65"/>
  <rect x="28" y="88" width="3"  height="8"  rx="1" fill="#FFFFFF" opacity="0.50"/>
  <rect x="33" y="86" width="5"  height="10" rx="2" fill="#FFFFFF" opacity="0.70"/>
  <rect x="40" y="88" width="3"  height="8"  rx="1" fill="#FFFFFF" opacity="0.50"/>
  <rect x="45" y="87" width="4"  height="9"  rx="2" fill="#FFFFFF" opacity="0.60"/>
  <rect x="51" y="89" width="3"  height="7"  rx="1" fill="#FFFFFF" opacity="0.45"/>
  <rect x="56" y="87" width="4"  height="9"  rx="2" fill="#FFFFFF" opacity="0.60"/>

  <!-- Floor line -->
  <rect x="8" y="108" width="92" height="2" rx="1" fill="#FFFFFF" opacity="0.22"/>

  <!-- ── Wordmark: "Shelf" in white ── -->
  <text x="136" y="82"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="56" font-weight="700" letter-spacing="-2"
        fill="#FFFFFF">Shelf</text>

  <!-- Accent dot after wordmark -->
  <circle cx="344" cy="80" r="5" fill="#FFFFFF" opacity="0.80"/>
</svg>
