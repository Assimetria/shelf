<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Shelf mark: three horizontal bars (shelves) increasing in width, top to bottom -->
  <!-- Evokes a library shelf / organised knowledge stack -->

  <!-- Top shelf (narrowest) -->
  <rect x="156" y="152" width="200" height="44" rx="22" fill="#F97316"/>

  <!-- Middle shelf -->
  <rect x="106" y="234" width="300" height="44" rx="22" fill="#F97316" opacity="0.82"/>

  <!-- Bottom shelf (widest) -->
  <rect x="56" y="316" width="400" height="44" rx="22" fill="#F97316" opacity="0.62"/>
</svg>
